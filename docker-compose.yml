version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: nexus_db
    restart: always
    environment:
      POSTGRES_USER: nexus_admin
      POSTGRES_PASSWORD: nexus_password
      POSTGRES_DB: arconorte_nexus
    ports:
      - "5432:5432"
    volumes:
      - nexus_postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: nexus_cache
    restart: always
    ports:
      - "6379:6379"

volumes:
  nexus_postgres_data:
